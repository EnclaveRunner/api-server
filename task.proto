syntax = "proto3";

option go_package = "proto_gen/";

import "registry.proto";

package task;

message FunctionIdentifier {
  registry.ArtifactIdentifier artifact  = 1;
  string                      interface = 2;
  string                      name      = 3;
}

message Parameter {
  oneof value {
    int32  i32 = 1;
    int64  i64 = 2;
    float  flt = 3;
    double dbl = 4;
  }
}

message EnvironmentVariable {
  string key   = 1;
  string value = 2;
}

message Task {
  string                       task_id               = 1;
  FunctionIdentifier           function              = 2;
  repeated Parameter           parameters            = 3;
  repeated string              arguments             = 4;
  repeated EnvironmentVariable environment_variables = 5;
}
